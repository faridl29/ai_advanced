# LiteLLM Configuration — Unified OpenAI-compatible gateway
# All models route through Ollama running on same Docker network

model_list:
  # === Primary models (small, CPU-friendly) ===
  - model_name: phi3
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://ollama:11434
      stream: true

  - model_name: qwen2.5
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://ollama:11434
      stream: true

  - model_name: gemma3
    litellm_params:
      model: ollama/gemma3:4b
      api_base: http://ollama:11434
      stream: true

  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434
      stream: true

  # === Medium model (16 GB only) ===
  - model_name: mistral
    litellm_params:
      model: ollama/mistral:7b-instruct-q4_K_M
      api_base: http://ollama:11434
      stream: true

  # === Embedding model ===
  - model_name: nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

# Router settings
router_settings:
  num_retries: 2
  timeout: 120
  enable_caching: true
  cache_params:
    type: redis
    host: redis
    port: 6379

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  request_timeout: 120
  telemetry: false
  set_verbose: false
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

environment_variables:
  LANGFUSE_HOST: http://langfuse:3000
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
