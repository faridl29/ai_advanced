# LiteLLM Configuration — Unified OpenAI-compatible gateway
# All models route through Ollama running on same Docker network

model_list:
  - model_name: qwen3:1.7b
    litellm_params:
      model: ollama/qwen3:1.7b
      api_base: http://ollama:11434
      stream: true
      # Disable qwen3's thinking mode to prevent slow <think>...</think> blocks
      # and keep responses fast (qwen3 emits reasoning by default).
      think: false

  # === Embedding model ===
  - model_name: nomic-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

# Router settings
router_settings:
  num_retries: 2
  timeout: 120
  enable_caching: true
  cache_params:
    type: redis
    host: redis
    port: 6379

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  request_timeout: 120
  telemetry: false
  set_verbose: false
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]

environment_variables:
  LANGFUSE_HOST: http://langfuse:3000
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
