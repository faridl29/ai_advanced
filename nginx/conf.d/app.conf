# Nginx reverse proxy — production hardening (Tahap 8)
resolver 127.0.0.11 valid=30s ipv6=off;

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=chat:10m rate=5r/s;

upstream app_backend {
    server app:8080;
}

server {
    listen 80 default_server;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health (no rate limit)
    location = /health {
        proxy_pass http://app_backend/health;
        proxy_set_header Host $host;
    }

    # API docs
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
    }

    # Chat endpoints (strict rate limit) — supports streaming via SSE
    location ~ ^/v1/(chat|chat/completions|chat/stream|agents) {
        limit_req zone=chat burst=3 nodelay;
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        # Streaming essentials
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # All other API routes
    location /v1/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Static HTML/JS/CSS SPA UI
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Langfuse UI proxy
    location /langfuse/ {
        set $langfuse_upstream http://langfuse:3000;
        proxy_pass $langfuse_upstream/;
        proxy_set_header Host $host;
    }

    # LiteLLM admin (optional)
    location /litellm/ {
        set $litellm_upstream http://litellm:4000;
        proxy_pass $litellm_upstream/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }
}
